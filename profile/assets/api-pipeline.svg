<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 145" role="img" aria-labelledby="title desc">
  <title id="title">TrustEdge Agent API pipeline</title>
  <desc id="desc">Secure upload to Agent API to Validate to Persist to Stream to Detection Attack to Alert</desc>
  <defs>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <style>
      .lbl { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; font-size: 11.5px; font-weight: 700; }
      .sub { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; font-size: 9.5px; fill: #64748B; }
    </style>
  </defs>

  <!-- 1 Secure upload -->
  <g transform="translate(70,48)">
    <path d="M0 12 L-14 4 V-2 C-14 -10 -8 -14 0 -14 C8 -14 14 -10 14 -2 V4 Z"
          fill="#EFF6FF" stroke="#2563EB" stroke-width="2" stroke-linejoin="round"/>
    <path d="M0 -2 v8 M0 6 l4 -3.5 M0 6 l-4 -3.5" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="-5" r="2.2" fill="#2563EB"/>
    <text class="lbl" y="38" text-anchor="middle" fill="#1E3A8A">Secure</text>
    <text class="sub" y="52" text-anchor="middle">upload</text>
  </g>
  <path d="M120 48 H145 L140 43 M145 48 L140 53" fill="none" stroke="url(#arrow)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 2 Agent API -->
  <g transform="translate(205,48)">
    <rect x="-18" y="-14" width="36" height="28" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
    <path d="M-8 -4 h-4 v8 h4 M8 -4 h4 v8 h-4" fill="none" stroke="#8B5CF6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="2" fill="#7C3AED"/>
    <text class="lbl" y="38" text-anchor="middle" fill="#5B21B6">Agent API</text>
  </g>
  <path d="M255 48 H280 L275 43 M280 48 L275 53" fill="none" stroke="url(#arrow)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3 Validate -->
  <g transform="translate(345,48)">
    <path d="M0 -14 L12 -8 V2 C12 8 6 12 0 16 C-6 12 -12 8 -12 2 V-8 Z"
          fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" stroke-linejoin="round"/>
    <path d="M-4 0 l3 3 6 -7" fill="none" stroke="#7C3AED" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="lbl" y="42" text-anchor="middle" fill="#5B21B6">Validate</text>
  </g>
  <path d="M395 48 H420 L415 43 M420 48 L415 53" fill="none" stroke="url(#arrow)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 4 Persist -->
  <g transform="translate(480,48)">
    <ellipse cx="0" cy="-8" rx="14" ry="5" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
    <path d="M-14 -8 V6 C-14 10 -8 12 0 12 S14 10 14 6 V-8" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <path d="M-14 0 C-14 4 -8 6 0 6 S14 4 14 0" fill="none" stroke="#A78BFA" stroke-width="1.6"/>
    <text class="lbl" y="42" text-anchor="middle" fill="#5B21B6">Persist</text>
  </g>
  <path d="M530 48 H555 L550 43 M555 48 L550 53" fill="none" stroke="url(#arrow)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 5 Stream -->
  <g transform="translate(620,48)">
    <path d="M-16 0 C-10 -10 -4 10 2 0 S12 -10 16 0" fill="none" stroke="#7C3AED" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M-16 8 C-10 -2 -4 18 2 8 S12 -2 16 8" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
    <path d="M-16 -8 C-10 -18 -4 2 2 -8 S12 -18 16 -8" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
    <text class="lbl" y="42" text-anchor="middle" fill="#5B21B6">Stream</text>
  </g>
  <path d="M670 48 H695 L690 43 M695 48 L690 53" fill="none" stroke="url(#arrow)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 6 Detection Attack -->
  <g transform="translate(760,48)">
    <circle cx="-3" cy="-3" r="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.2"/>
    <circle cx="-3" cy="-3" r="5" fill="none" stroke="#8B5CF6" stroke-width="1.8"/>
    <path d="M6 6 L13 13" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <text class="lbl" y="38" text-anchor="middle" fill="#5B21B6">Detection</text>
    <text class="sub" y="52" text-anchor="middle">Attack</text>
  </g>
  <path d="M820 48 H845 L840 43 M845 48 L840 53" fill="none" stroke="url(#arrow)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 7 Alert -->
  <g transform="translate(910,48)">
    <path d="M0 12 C-12 12 -14 2 -14 -2 C-14 -10 -8 -14 0 -16 C8 -14 14 -10 14 -2 C14 2 12 12 0 12 Z"
          fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" stroke-linejoin="round"/>
    <path d="M-4 14 C-2 17 2 17 4 14" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-18" r="2" fill="#7C3AED"/>
    <text class="lbl" y="42" text-anchor="middle" fill="#5B21B6">Alert</text>
  </g>
</svg>
